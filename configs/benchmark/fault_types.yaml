fault_types:
  data_drift:
    phase: P1
    priority: core
    description: Distribution shift between training and evaluation data.
    ground_truth_kind: dominant_cause
    injector: aletheia_lab.benchmark.injectors.CategoricalDriftInjector
    injection:
      feature: Contract
      # 5 settings x 3 evidence conditions (full/missing_key/noisy) = 15 P1 cases.
      # Each setting shifts one feature only (one-factor); seed makes it reproducible.
      settings:
        - injection_id: drift_contract_s1
          seed: 1
          target_distribution: {Month-to-month: 0.80, One year: 0.12, Two year: 0.08}
        - injection_id: drift_contract_s2
          seed: 2
          target_distribution: {Month-to-month: 0.70, One year: 0.18, Two year: 0.12}
        - injection_id: drift_contract_s3
          seed: 3
          target_distribution: {Month-to-month: 0.90, One year: 0.06, Two year: 0.04}
        - injection_id: drift_contract_s4
          seed: 4
          target_distribution: {Month-to-month: 0.40, One year: 0.30, Two year: 0.30}
        - injection_id: drift_contract_s5
          seed: 5
          target_distribution: {Month-to-month: 0.60, One year: 0.20, Two year: 0.20}
    expected_evidence:
      - dataset_profile_before
      - dataset_profile_after
      - metric_regression
      - feature_distribution_shift
      - run_config
    negative_controls:
      - unchanged_training_code
      - unchanged_model_architecture

  label_noise:
    phase: P2
    priority: core
    description: Incorrect labels injected into a controlled subset.
    ground_truth_kind: dominant_cause
    expected_evidence:
      - label_flip_manifest
      - class_confusion_change
      - metric_regression
      - sample_audit
    negative_controls:
      - unchanged_feature_distribution

  preprocessing_bug:
    phase: P2
    priority: core
    description: Feature scaling, encoding, normalization, or tokenization bug.
    ground_truth_kind: dominant_cause
    expected_evidence:
      - preprocessing_config_diff
      - feature_stats_before_after
      - downstream_metric_regression
    negative_controls:
      - unchanged_labels

  train_eval_mismatch:
    phase: P2
    priority: core
    description: Difference between training pipeline and inference/evaluation pipeline.
    ground_truth_kind: dominant_cause
    expected_evidence:
      - train_pipeline_signature
      - eval_pipeline_signature
      - config_diff
      - metric_regression

  prompt_regression:
    phase: stretch
    priority: optional
    description: Prompt/template change causing LLM task performance regression.
    ground_truth_kind: dominant_cause
    expected_evidence:
      - prompt_diff
      - output_quality_change
      - regression_examples
      - judge_notes
