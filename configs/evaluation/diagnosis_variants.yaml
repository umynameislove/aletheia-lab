schema_version: p1-diagnosis-variants/1

active_p1_pilot:
  - b1_plain
  - a3_evidence_contract

shared_contract:
  observable_facts: identical_semantic_item_ledger
  provider_model_version: deterministic-mock/p1-contract-fixture/1
  temperature: 0.0
  top_p: 1.0
  seed: 17
  max_output_tokens: 600
  timeout_seconds: 60.0
  max_attempts: 2
  response_schema: diagnosis-output/1
  raw_response_saved_before_parse: true
  silent_provider_or_model_switch: forbidden

variants:
  b1_plain:
    role: matched_plain_llm_baseline
    prompt_version: p1-g6/1
    renderer_version: p1-plain-facts/1
    intervention: plain_text_rendering_without_citation_or_abstention_requirements
    forbidden_inputs:
      - ground_truth
      - case_id
      - case_family_id
      - evidence_condition
      - expected_diagnosis_behavior

  a3_evidence_contract:
    role: aletheia_citation_and_abstention_ablation
    prompt_version: p1-g6/1
    renderer_version: p1-structured-evidence/1
    intervention: structured_evidence_with_citation_and_abstention_requirements
    forbidden_inputs:
      - ground_truth
      - case_id
      - case_family_id
      - evidence_condition
      - expected_diagnosis_behavior

planned_after_p1_g6a:
  - b0_deterministic_reference
  - b2_generic_multiturn_rag
  - b3_logdx_ci_transfer
  - a1_structured_evidence
  - a2_evidence_with_citations
  - full_aletheia
