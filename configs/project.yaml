project:
  name: aletheia-lab
  version: 0.1.0

# Primary benchmark dataset. The data_drift injector is dataset-agnostic;
# switching dataset only changes this block. Exact source URL + SHA-256 are pinned
# by the reproducible download script, not hardcoded here.
dataset:
  id: telco_customer_churn
  version: v1
  source: IBM sample "Telco Customer Churn"
  license: See upstream IBM sample-data terms
  target: Churn
  positive_class: "Yes"
  n_rows_approx: 7043
  drift_feature: Contract           # categories: month-to-month / one year / two year
  rationale: >
    Small, fast, and rich in categorical features
    (Contract, PaymentMethod, InternetService...) ideal for categorical distribution
    drift. Matches the running example in docs and the P1 injector.

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  benchmark_cases: data/benchmark_cases
  evidence_store: data/evidence_store
  reports: reports
  experiments: experiments

benchmark:
  fault_type: data_drift
  target_cases: 15
  dataset_family: tabular_classification

diagnosis_variants:
  - b1_plain
  - a3_evidence_contract

evaluation:
  primary_metrics:
    - correctness
    - faithfulness
    - abstention
    - divergence
  human_audit:
    enabled: true
    sampling_strategy: census_all_contexts
    agreement_metric: cohens_kappa

guardrails:
  forbid_ground_truth_leakage_in_evidence: true
  require_reproducible_case_manifest: true
  require_controlled_evidence_conditions: true
  require_error_analysis_for_publishable_claim: true

baseline:
  seed: 42
  split:
    train: 0.70
    validation: 0.15
    test: 0.15
    stratify: true
  model:
    type: logistic_regression
    max_iter: 1000
    C: 1.0
    class_weight: null
  output_dir: experiments/baseline/runs
  tolerance: 1.0e-9
